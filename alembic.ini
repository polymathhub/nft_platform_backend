[alembic]
script_location = alembic

# SQLAlchemy database URL
# DO NOT set here. Instead, load from environment variable in env.py:
# 
# Priority order:
#   1. ALEMBIC_SQLALCHEMY_URL environment variable (explicit Alembic config)
#   2. DATABASE_URL environment variable (FastAPI config)
# 
# Example environment variable:
#   export DATABASE_URL=postgresql+asyncpg://nft_user:password@host:5432/dbname
# 
# IMPORTANT: Must use postgresql+asyncpg driver for async migrations.
# NEVER use postgres:// or postgresql:// without +asyncpg
sqlalchemy.url = driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
