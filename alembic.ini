[alembic]
script_location = alembic

# SQLAlchemy database URL
# IMPORTANT: This MUST use asyncpg driver for async migrations
# Examples:
#   postgresql+asyncpg://user:password@localhost/dbname
#   postgresql+asyncpg://nft_user:GiftedForge@5.252.155.82:5432/nft_db
# 
# Can use environment variable: ${DATABASE_URL}
# Or set via: ALEMBIC_SQLALCHEMY_URL environment variable
# Or set via: DATABASE_URL environment variable (fallback)
sqlalchemy.url = ${DATABASE_URL}
