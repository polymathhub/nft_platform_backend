name: CI/CD - Vendor, Migrate, Build & Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install JS deps & vendor TonConnect
        run: |
          npm ci --no-audit --no-fund || true
          npm install @tonconnect/ui@latest --no-save
          mkdir -p app/static/vendor/tonconnect
          cp -R node_modules/@tonconnect/ui/dist/* app/static/vendor/tonconnect/ || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations (CI)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "Running alembic upgrade head"
            alembic upgrade head
          else
            echo "DATABASE_URL not set, skipping migrations"
          fi

      - name: Build Docker image
        env:
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
        run: |
          if [ -z "$IMAGE_NAME" ]; then
            echo "IMAGE_NAME secret not set - skipping docker build"
            exit 0
          fi
          docker build -t $IMAGE_NAME:${GITHUB_SHA::8} .

      - name: Login to registry
        if: secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push Docker image
        if: secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        env:
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
        run: |
          docker tag $IMAGE_NAME:${GITHUB_SHA::8} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${GITHUB_SHA::8}
          docker push $IMAGE_NAME:latest

      - name: Upload vendored assets as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tonconnect-vendor
          path: app/static/vendor/tonconnect/

      - name: Finish
        run: echo "CI/CD workflow completed"
