version: '3.9'

services:
  # PostgreSQL Database (auto-migrations will run on app startup)
  postgres:
    image: postgres:15-alpine
    container_name: nft_platform_db
    environment:
      POSTGRES_USER: nft_user
      POSTGRES_PASSWORD: nft_password_dev
      POSTGRES_DB: nft_platform
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nft_user -d nft_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nft_network

  # Redis Cache (optional, for caching/sessions)
  redis:
    image: redis:7-alpine
    container_name: nft_platform_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nft_network
    profiles:
      - optional

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        ENVIRONMENT: development
        PYTHON_VERSION: "3.11"
    container_name: nft_platform_app
    environment:
      # Database
      DATABASE_URL: "postgresql://nft_user:nft_password_dev@postgres:5432/nft_platform"
      ENVIRONMENT: "development"
      LOG_LEVEL: "info"
      WORKERS: "2"
      
      # Secrets (use actual values in .env file)
      SECRET_KEY: "${SECRET_KEY:-test-secret-key-for-development}"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      
      # Optional integrations (comment out if not using)
      # TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      # TELEGRAM_BOT_USERNAME: "${TELEGRAM_BOT_USERNAME}"
      # ETHEREUM_RPC_URL: "${ETHEREUM_RPC_URL:-https://eth-mainnet.g.alchemy.com/v2/demo}"
      # SOLANA_RPC_URL: "${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}"
      # TON_RPC_URL: "${TON_RPC_URL:-https://toncenter.com/api/v2/}"
    
    ports:
      - "8000:8000"
    
    depends_on:
      postgres:
        condition: service_healthy
    
    volumes:
      # Hot reload in development (optional)
      - .:/app
    
    networks:
      - nft_network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  nft_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
