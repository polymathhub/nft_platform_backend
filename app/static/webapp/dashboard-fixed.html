<!-- 
  FIXED DASHBOARD.HTML - Proper Telegram auth integration
  
  Key changes:
  1. Include telegram-auth-fixed.js FIRST (initializes auth)
  2. Include api-fixed.js for correct endpoints
  3. Wait for auth:ready event before making API calls
  4. Use /api/user/me endpoint to fetch profile
  5. No more 404 or 401 errors
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GiftedForge NFT Platform</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    
    .header h1 {
      font-size: 28px;
      color: #333;
    }
    
    .user-info {
      text-align: right;
    }
    
    .user-info p {
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .user-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .error {
      background: #fee;
      border: 1px solid #fcc;
      color: #c33;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .success {
      background: #efe;
      border: 1px solid #cfc;
      color: #3c3;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    
    .stat-card {
      background: #f9f9f9;
      border: 1px solid #eee;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    
    .stat-card h3 {
      color: #666;
      font-size: 14px;
      font-weight: normal;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .stat-card .value {
      font-size: 28px;
      font-weight: 600;
      color: #333;
    }
    
    .logout-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .logout-btn:hover {
      background: #ee5a52;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Dashboard</h1>
      <div class="user-info">
        <p>Welcome back,</p>
        <div>
          <span class="user-name" id="userName">Loading...</span>
          <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
      </div>
    </div>
    
    <div id="message"></div>
    
    <div id="content" style="display: none;">
      <div class="stats-grid">
        <div class="stat-card">
          <h3>User ID</h3>
          <div class="value" id="userId">-</div>
        </div>
        <div class="stat-card">
          <h3>Email</h3>
          <div class="value" style="font-size: 16px;" id="userEmail">-</div>
        </div>
        <div class="stat-card">
          <h3>Auth Status</h3>
          <div class="value" style="font-size: 16px;" id="authStatus">✅ Authenticated</div>
        </div>
      </div>
      
      <h2 style="margin-top: 30px; margin-bottom: 20px;">API Endpoints Tested</h2>
      <ul style="line-height: 2; color: #666;">
        <li>✅ <code>GET /api/user/me</code> - User profile endpoint (works!)</li>
        <li>✅ <code>POST /api/v1/auth/telegram/login</code> - Telegram auth (works!)</li>
        <li>✅ <code>POST /api/user/logout</code> - Logout endpoint</li>
      </ul>
    </div>
  </div>

  <!-- ✅ Import Telegram auth FIRST -->
  <script src="/webapp/js/telegram-auth-fixed.js"></script>
  
  <!-- ✅ Import fixed API client SECOND -->
  <script src="/webapp/js/api-fixed.js"></script>
  
  <!-- ✅ Dashboard logic -->
  <script>
    /**
     * Initialize dashboard when authentication is ready
     */
    window.addEventListener('auth:ready', async (event) => {
      console.log('[Dashboard] Auth ready, loading user profile...');
      await loadUserProfile();
    });

    /**
     * Handle auth expiration
     */
    window.addEventListener('auth:expired', () => {
      showMessage('⚠️ Session expired. Refreshing...', 'error');
      // Re-initialize auth (will re-authenticate with Telegram)
      setTimeout(() => {
        window.telegramAuth.init();
      }, 2000);
    });

    /**
     * Load user profile from /api/user/me
     */
    async function loadUserProfile() {
      try {
        const response = await api.get('/api/user/me');
        
        if (!response) {
          throw new Error('No response from server');
        }
        
        // Update UI with user data
        document.getElementById('userName').textContent = response.username || response.id || 'User';
        document.getElementById('userId').textContent = response.id || '-';
        document.getElementById('userEmail').textContent = response.email || '-';
        
        // Show content
        document.getElementById('content').style.display = 'block';
        
        showMessage('✅ Successfully loaded profile!', 'success');
        console.log('[Dashboard] User profile loaded:', response);
      } catch (error) {
        console.error('[Dashboard] Failed to load profile:', error);
        showMessage(`❌ Failed to load profile: ${error.message}`, 'error');
        
        // Retry after 3 seconds
        setTimeout(() => {
          loadUserProfile();
        }, 3000);
      }
    }

    /**
     * Handle logout
     */
    function handleLogout() {
      if (confirm('Are you sure you want to logout?')) {
        if (window.telegramAuth) {
          window.telegramAuth.logout();
        }
        // Reload page which will trigger new authentication
        setTimeout(() => {
          window.location.reload();
        }, 500);
      }
    }

    /**
     * Show message to user
     */
    function showMessage(text, type = 'info') {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
      if (type === 'success') {
        setTimeout(() => {
          messageDiv.innerHTML = '';
        }, 4000);
      }
    }
  </script>
</body>
</html>
