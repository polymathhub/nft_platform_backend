<!-- TOP HEADER -->
<header class="app-header">
  <div class="header-container">
    <!-- Brand -->
    <div class="header-brand">
    <img src="https://image2url.com/r2/default/images/1772911080422-1fac44d8-6cdb-4487-9c53-4bdd5d871163.png" alt="GiftedForge" class="brand-logo">
    <!-- Header Actions -->
    <div class="header-actions">
      <!-- Notifications -->
      <button class="icon-btn notification-btn" id="notificationBtn" aria-label="Notifications">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span class="notification-badge" id="notificationBadge"></span>
      </button>

      <!-- Profile -->
      <button class="icon-btn profile-btn" id="profileBtn" aria-label="Profile">
        <div class="profile-avatar" id="profileAvatar">U</div>
      </button>
    </div>
  </div>

  <!-- Notification Dropdown -->
  <div class="notification-dropdown" id="notificationDropdown">
    <div class="dropdown-header">
      <h3>Notifications</h3>
      <button class="close-btn" id="notificationClose">×</button>
    </div>
    <div class="notification-list" id="notificationList">
      <div class="empty-message">No notifications</div>
    </div>
  </div>

  <!-- Profile Dropdown -->
  <div class="profile-dropdown" id="profileDropdown">
    <div class="dropdown-header">
      <div class="profile-avatar-large" id="profileAvatarLarge">U</div>
      <div>
        <div class="user-name" id="userName">User</div>
        <div class="user-email" id="userEmail">user@example.com</div>
      </div>
    </div>
    <nav class="dropdown-nav">
      <a href="/webapp/profile.html" class="dropdown-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        Profile
      </a>
      <a href="/webapp/wallet.html" class="dropdown-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <path d="M1 10h22"></path>
        </svg>
        Wallet
      </a>
      <a href="#" class="dropdown-link" id="darkModeToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <span id="darkModeText">Dark Mode</span>
      </a>
    </nav>
    <div class="dropdown-divider"></div>
    <a href="#" class="dropdown-link logout-link" id="logoutBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Logout
    </a>
  </div>
</header>
