<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="GiftedForge - Trade, create, and collect NFTs on the most secure Web3 marketplace">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GiftedForge">

  <title>GiftedForge - NFT Marketplace</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    /* Landing Page Only */
    html {
      --safe-area-inset-top: env(safe-area-inset-top, 0px);
      --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      --safe-area-inset-left: env(safe-area-inset-left, 0px);
      --safe-area-inset-right: env(safe-area-inset-right, 0px);
    }

    body {
      padding-top: var(--safe-area-inset-top);
      padding-bottom: var(--safe-area-inset-bottom);
      padding-left: var(--safe-area-inset-left);
      padding-right: var(--safe-area-inset-right);
      margin: 0;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      min-height: 100vh;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-2xl) var(--space-md);
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: '';
      position: absolute;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    main::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .background-stamp {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      background-image: url('https://image2url.com/r2/default/images/1772925910890-2975531d-b68f-4cd1-ba95-f7483fc720e6.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* Clean stamp positions with enhanced spacing */
    .stamp-1 {
      top: 5%;
      left: 3%;
      width: 160px;
      height: 160px;
      opacity: 0.06;
    }

    .stamp-2 {
      bottom: 8%;
      right: 5%;
      width: 180px;
      height: 180px;
      opacity: 0.06;
    }

    .stamp-3 {
      top: 45%;
      right: 4%;
      width: 150px;
      height: 150px;
      opacity: 0.05;
    }

    .stamp-4 {
      bottom: 50%;
      left: 2%;
      width: 170px;
      height: 170px;
      opacity: 0.06;
    }

    .stamp-5 {
      top: 8%;
      right: 45%;
      width: 140px;
      height: 140px;
      opacity: 0.05;
    }

    .stamp-6 {
      top: 75%;
      left: 5%;
      width: 130px;
      height: 130px;
      opacity: 0.05;
    }

    .stamp-7 {
      top: 12%;
      right: 8%;
      width: 150px;
      height: 150px;
      opacity: 0.06;
    }

    .stamp-8 {
      bottom: 12%;
      right: 42%;
      width: 160px;
      height: 160px;
      opacity: 0.055;
    }

    .stamp-9 {
      top: 60%;
      left: 42%;
      width: 145px;
      height: 145px;
      opacity: 0.05;
    }

    .stamp-10 {
      bottom: 5%;
      left: 45%;
      width: 135px;
      height: 135px;
      opacity: 0.055;
    }

    .stamp-11 {
      top: 3%;
      right: 15%;
      width: 155px;
      height: 155px;
      opacity: 0.06;
    }

    .stamp-12 {
      top: 70%;
      right: 12%;
      width: 145px;
      height: 145px;
      opacity: 0.055;
    }

    .stamp-13 {
      bottom: 35%;
      left: 50%;
      width: 150px;
      height: 150px;
      opacity: 0.05;
    }

    .stamp-14 {
      top: 25%;
      left: 48%;
      width: 160px;
      height: 160px;
      opacity: 0.055;
    }

    .stamp-15 {
      top: 82%;
      left: 48%;
      width: 130px;
      height: 130px;
      opacity: 0.055;
    }

    .stamp-16 {
      bottom: 25%;
      right: 10%;
      width: 145px;
      height: 145px;
      opacity: 0.05;
    }

    .stamp-17 {
      top: 35%;
      right: 55%;
      width: 140px;
      height: 140px;
      opacity: 0.055;
    }

    .stamp-18 {
      top: 50%;
      right: 35%;
      width: 155px;
      height: 155px;
      opacity: 0.05;
    }

    .hero-content {
      max-width: 500px;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-name {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: white;
      margin-bottom: var(--space-lg);
      animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .headline {
      font-size: clamp(1.8rem, 8vw, 2.8rem);
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.03em;
      color: white;
      margin: 0 0 var(--space-lg) 0;
      animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.05s backwards;
    }

    .tagline {
      font-size: var(--font-size-base);
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: var(--space-2xl);
      line-height: 1.7;
      font-weight: 500;
      animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s backwards;
    }

    .btn-primary {
      width: 100%;
      height: 52px;
      background: white;
      color: black;
      border: none;
      border-radius: 12px;
      font-size: var(--font-size-base);
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      padding: 0;
      font-family: inherit;
    }

    .btn-primary:hover {
      opacity: 0.95;
      transform: translateY(-2px);
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.6), 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .separator {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: var(--font-size-base);
      margin: var(--space-md) 0;
      font-weight: 500;
    }

    .btn-secondary {
      width: 100%;
      height: 52px;
      background: transparent;
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      font-size: var(--font-size-base);
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms ease;
      padding: 0;
      font-family: inherit;
    }

    .btn-secondary:hover {
      border-color: white;
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:active {
      border-color: rgba(255, 255, 255, 0.6);
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 300ms ease;
      padding: var(--space-md);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl);
      max-width: 450px;
      width: 100%;
      text-align: center;
      animation: slideUp 300ms ease;
    }

    .modal-icon { font-size: 3rem; margin-bottom: var(--space-lg); }
    .modal-title { font-size: var(--font-size-xl); margin-bottom: var(--space-md); color: var(--text-primary); font-weight: 700; }
    .modal-description { color: var(--text-secondary); margin-bottom: var(--space-lg); line-height: 1.6; font-size: var(--font-size-sm); }
    .modal-steps { background: var(--bg-primary); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-lg); text-align: left; border: 1px solid var(--border-primary); }
    .modal-steps-title { font-size: var(--font-size-xs); color: var(--text-tertiary); margin-bottom: var(--space-sm); font-weight: 600; text-transform: uppercase; }
    .modal-steps ol { margin: 0; padding-left: var(--space-lg); color: var(--text-secondary); font-size: var(--font-size-sm); }
    .modal-steps li { margin-bottom: var(--space-sm); }
    .modal-footer { color: var(--text-tertiary); font-size: var(--font-size-xs); margin-top: var(--space-lg); margin-bottom: 0; }

    @media (max-width: 480px) {
      main { padding: var(--space-xl) var(--space-md); }
      .headline { font-size: clamp(1.6rem, 6vw, 2.2rem); }
      .btn-primary, .btn-secondary { height: 48px; font-size: var(--font-size-sm); }
    }
  </style>
</head>
<body>
  <!-- Landing Page -->
  <main>
    <!-- Artistic background stamp composition - 18 layered stamps for depth -->
    <div class="background-stamp stamp-1"></div>
    <div class="background-stamp stamp-2"></div>
    <div class="background-stamp stamp-3"></div>
    <div class="background-stamp stamp-4"></div>
    <div class="background-stamp stamp-5"></div>
    <div class="background-stamp stamp-6"></div>
    <div class="background-stamp stamp-7"></div>
    <div class="background-stamp stamp-8"></div>
    <div class="background-stamp stamp-9"></div>
    <div class="background-stamp stamp-10"></div>
    <div class="background-stamp stamp-11"></div>
    <div class="background-stamp stamp-12"></div>
    <div class="background-stamp stamp-13"></div>
    <div class="background-stamp stamp-14"></div>
    <div class="background-stamp stamp-15"></div>
    <div class="background-stamp stamp-16"></div>
    <div class="background-stamp stamp-17"></div>
    <div class="background-stamp stamp-18"></div>

    <div class="hero-content">
      <div class="brand-name">GiftedForge</div>
      <h1 class="headline">Buy & Sell NFTs with Stars</h1>
      <p class="tagline">Trade premium NFTs securely using Telegram Stars. Connect your TON wallet and start collecting or selling today.</p>
      
      <div class="button-group">
        <button class="btn-primary" id="connectBtn">Connect TON Wallet</button>
        <div class="separator">or</div>
        <button class="btn-secondary" id="exploreBtn">Browse Marketplace</button>
      </div>
    </div>
  </main>

  <!-- TON Wallet Connection Modal (created dynamically) -->
  <div id="tonModal"></div>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- TonConnect UI Library -->
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.css">

  <!-- Application Module -->
  <script type="module">
    import { auth } from '/webapp/js/auth.js';
    const tg = window.Telegram.WebApp;
    let tonConnectUI;

    async function initializeApp() {
      // Ready the WebApp
      tg.ready();
      tg.expand();

      // Initialize TonConnect UI
      try {
        tonConnectUI = new TonConnectUI({
          manifestUrl: window.location.origin + '/static/manifest.json',
          buttonRootId: 'tonconnect-button'
        });
      } catch (error) {
        console.log('TonConnect UI not available, using fallback mode');
      }

      // Check if user is authenticated
      const token = localStorage.getItem('token');
      if (token) {
        // Redirect authenticated users to dashboard
        window.location.href = '/dashboard';
        return;
      }

      // Authenticate with Telegram data
      try {
        const initData = tg.initData;
        if (initData) {
          const authResponse = await fetch('/api/v1/auth/telegram/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              init_data: initData
            })
          });

          if (authResponse.ok) {
            const authData = await authResponse.json();
            if (authData.token) {
              localStorage.setItem('token', authData.token);
              console.log('Authenticated via Telegram');
            }
          }
        }
      } catch (error) {
        console.log('Telegram auth not available, showing landing page');
      }

      // Setup event listeners
      document.getElementById('connectBtn').addEventListener('click', handleConnectTelegram);
      document.getElementById('exploreBtn').addEventListener('click', () => {
        window.location.href = '/marketplace';
      });
    }

    async function handleConnectTelegram() {
      try {
        // Get connect request from backend
        console.debug('[index] handleConnectTelegram - requesting connect-request');
        const headers = {
          'Content-Type': 'application/json'
        };
        const token = localStorage.getItem('token');
        if (token) headers['Authorization'] = `Bearer ${token}`;

        const connectResponse = await fetch('/api/v1/wallet/ton/connect-request', {
          method: 'POST',
          headers,
          credentials: 'include',
          body: JSON.stringify({
            manifest: {
              name: 'GiftedForge NFT Marketplace',
              description: 'Trade, create, and collect NFTs using Telegram Stars',
              url: window.location.origin,
              iconUrl: window.location.origin + '/static/icon.svg'
            }
          })
        });

        if (!connectResponse.ok) {
          const error = await connectResponse.json();
          console.error('[index] connect-request failed', error);
          throw new Error(error.detail || 'Failed to initiate TON connection');
        }

        const connectData = await connectResponse.json();
        console.debug('[index] connect-request response', connectData);
        const sessionId = connectData.session_id;

        // Show wallet selection modal
        showWalletSelectionModal(sessionId);
      } catch (error) {
        console.error('TON wallet connection error:', error);
        tg.showAlert(`Failed to connect: ${error.message}`);
      }
    }

    function showWalletSelectionModal(sessionId) {
      const modal = document.getElementById('tonModal');
      
      modal.innerHTML = `
        <div class="modal">
          <div class="modal-content">
            <div class="modal-icon">🔐</div>
            <h2 class="modal-title">Connect Your Wallet</h2>
            <p class="modal-description">Choose your TON wallet app to connect and start trading NFTs with Telegram Stars.</p>
            
            <div style="display: flex; flex-direction: column; gap: var(--space-md);">
              <button class="btn-primary" id="tonkeeperBtn" style="text-align: left; padding-left: var(--space-md);">
                <span style="margin-right: var(--space-sm);">📱</span> Tonkeeper
              </button>
              <button class="btn-primary" id="walletBtn" style="text-align: left; padding-left: var(--space-md);">
                <span style="margin-right: var(--space-sm);">💳</span> Ton Wallet
              </button>
              <button class="btn-primary" id="telegramWalletBtn" style="text-align: left; padding-left: var(--space-md);">
                <span style="margin-right: var(--space-sm);">✈️</span> Telegram Wallet
              </button>
              <button class="btn-secondary" id="closeModalBtn">Cancel</button>
            </div>

            <p class="modal-footer">Don't have a wallet? Download Tonkeeper from App Store or Google Play.</p>
          </div>
        </div>
      `;

      document.getElementById('tonkeeperBtn').addEventListener('click', () => {
        connectWithWallet(sessionId, 'tonkeeper');
      });

      document.getElementById('walletBtn').addEventListener('click', () => {
        connectWithWallet(sessionId, 'tonwallet');
      });

      document.getElementById('telegramWalletBtn').addEventListener('click', () => {
        connectWithWallet(sessionId, 'tgwallet');
      });

      document.getElementById('closeModalBtn').addEventListener('click', () => {
        modal.innerHTML = '';
      });

      // Close modal on background click
      modal.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) {
          modal.innerHTML = '';
        }
      });
    }

    async function connectWithWallet(sessionId, walletType) {
      try {
        // Generate a demo wallet address for testing
        // In production, this would come from the wallet app via deep link or TonConnect
        const walletAddress = await getWalletAddressFromApp(walletType, sessionId);
        
        if (!walletAddress) {
          tg.showAlert(`Wallet connection cancelled`);
          return;
        }

        // Send wallet connection data to backend
        const cbHeaders = { 'Content-Type': 'application/json' };
        const cbToken = localStorage.getItem('token');
        if (cbToken) cbHeaders['Authorization'] = `Bearer ${cbToken}`;

        const response = await fetch('/api/v1/wallet/ton/callback', {
          method: 'POST',
          headers: cbHeaders,
          credentials: 'include',
          body: JSON.stringify({
            session_id: sessionId,
            wallet_address: walletAddress,
            tonconnect_session: {
              connected: true,
              wallet: walletType
            },
            wallet_metadata: {
              wallet_type: walletType,
              connection_method: 'deep_link',
              device: navigator.userAgent
            }
          })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.detail || 'Failed to connect wallet');
        }

        const result = await response.json();
        
        // Store token if provided
        if (result.token) {
          localStorage.setItem('token', result.token);
        }

        tg.showAlert('Wallet connected successfully!');
        
        // Redirect to dashboard
        window.location.href = result.redirect_url || '/dashboard';
      } catch (error) {
        console.error('Wallet connection error:', error);
        tg.showAlert(`Connection failed: ${error.message}`);
      }
    }

    async function getWalletAddressFromApp(walletType, sessionId) {
      // This function would normally be called after user returns from wallet app
      // For testing, we'll generate a valid TON address
      // In production, the wallet app returns this via deep link
      return new Promise((resolve) => {
        // Show deep link options to user
        const deepLinks = {
          'tonkeeper': `https://app.tonkeeper.com/ton-connect?client_id=${sessionId}`,
          'tonwallet': `ton://connect?request_id=${sessionId}`,
          'tgwallet': `https://wallet.tg/ton-connect?request_id=${sessionId}`
        };

        // Open the wallet app
        window.location.href = deepLinks[walletType];

        // Simulate wallet returning address after delay
        // In production, this would be handled by the wallet app sending data back
        setTimeout(() => {
          // Generate a valid TON address for demo
          const generatedAddress = '0:' + Math.random().toString(16).substr(2, 56).padEnd(56, '0');
          resolve(generatedAddress);
        }, 2000);
      });
    }

    // Initialize on page load
    initializeApp();
  </script>
</body>
</html>
