<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Minimal TON Connect (Telegram)</title>
  <style>
    body { font-family: system-ui, Arial; padding: 2rem; background:#f7fafc }
    .btn { padding: .75rem 1rem; border-radius:6px; border:0; background:#4f46e5; color:#fff }
    #status{ margin-top:1rem }
  </style>
</head>
<body>
  <h1>Minimal TON Connect</h1>
  <p>This page demonstrates a minimal Telegram WebApp + TON Connect flow (vanilla JS).</p>

  <button id="connect" class="btn">Connect TON Wallet</button>
  <div id="status"></div>

  <!-- Telegram SDK (loaded before module) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script type="module">
    const tg = window.Telegram?.WebApp ?? null;
    const statusEl = document.getElementById('status');

    function log(msg) { statusEl.textContent = msg; console.log(msg); }

    async function start() {
      if (tg) {
        try { tg.ready(); tg.expand(); log('Running inside Telegram WebApp'); }
        catch(e){ console.warn(e); }
      } else log('Not inside Telegram - running in browser');

      document.getElementById('connect').addEventListener('click', async () => {
        try {
          log('Requesting connect URL from backend...');
          const res = await fetch('/api/v1/wallet/ton/connect-request', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ manifest: {} }) });
          if (!res.ok) throw new Error('connect-request failed');
          const data = await res.json();
          log('Received connect URL. Opening...');
          const url = data.connect_url || data.connectUrl || data.connectUrl;
          if (!url) throw new Error('No connect_url returned');
          // Open inside Telegram when possible
          if (tg && typeof tg.openLink === 'function') tg.openLink(url);
          else window.open(url, '_blank');
          log('Opened wallet. After connecting, wallet should call backend callback.');
        } catch (err) {
          console.error(err);
          log('Error: ' + err.message);
        }
      });
    }

    start();
  </script>
</body>
</html>
