# Nginx reverse proxy configuration for NFT Platform Backend
# Location: /etc/nginx/sites-available/nft-platform.conf

upstream nft_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name 5.252.155.82 _;

    # Redirect HTTP to HTTPS (optional - uncomment for production with SSL)
    # return 301 https://$server_name$request_uri;

    client_max_body_size 100M;

    location / {
        proxy_pass http://nft_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /docs {
        proxy_pass http://nft_backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://nft_backend/openapi.json;
        proxy_set_header Host $host;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://nft_backend/health;
        access_log off;
    }
}

